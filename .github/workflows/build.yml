name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Both jobs fetch the directive's source dependencies (the tabnas parser
# engine and the jsonic relaxed-JSON grammar, from their GitHub main
# branches) via scripts/fetch-deps.sh, since neither is published to a
# registry. The Go job skips the TypeScript builds: the Go grammar lives
# in the vendored engine (.../go/jsonic) and needs no TS build.

jobs:
  ts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Fetch and build the tabnas parser + jsonic grammar
      shell: bash
      run: ./scripts/fetch-deps.sh
    - name: Build and test
      working-directory: ./ts
      run: |
        npm install
        npm run build --if-present
        npm test

  go:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: [1.24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Fetch the dependencies (Go only, skip TS build)
      shell: bash
      env:
        TABNAS_SKIP_TS_BUILD: "1"
      run: ./scripts/fetch-deps.sh
    - name: Build, vet and test
      working-directory: ./go
      run: |
        go build ./...
        go vet ./...
        go test ./...

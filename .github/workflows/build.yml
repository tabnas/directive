name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Both jobs fetch the only dependency — the tabnas parser engine, from
# its GitHub main branch — via scripts/fetch-parser.sh, since it is not
# published to a registry. The Go job skips the TypeScript engine build.
# The tests bring their own small grammar.

jobs:
  ts:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Fetch and build the tabnas parser engine
      shell: bash
      run: ./scripts/fetch-parser.sh
    - name: Build and test
      working-directory: ./ts
      run: |
        npm install
        npm run build --if-present
        npm test

  go:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: [1.24.x]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Fetch the parser engine (Go only, skip TS build)
      shell: bash
      env:
        TABNAS_SKIP_TS_BUILD: "1"
      run: ./scripts/fetch-parser.sh
    - name: Build, vet and test
      working-directory: ./go
      run: |
        go build ./...
        go vet ./...
        go test ./...
